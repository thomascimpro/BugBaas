name: Delete old arcade runs

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Delete arcade runs older than this many hours"
        required: true
        default: "48"
      dry_run:
        description: "Dry run only"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  delete-old-arcade-runs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Delete old arcade runs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          HOURS: ${{ inputs.hours }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/delete_old_arcade_runs.js --dry-run
          else
            node scripts/delete_old_arcade_runs.js
          fi
