name: Close duel season

on:
  schedule:
    - cron: "15 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  close-duel-season:
    name: Close previous duel season
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Dry-run close previous duel season
        env:
          FIREBASE_PROJECT_ID: thomascimpro-6266f
        run: node scripts/close_duel_season.mjs

      - name: Close previous duel season
        env:
          FIREBASE_PROJECT_ID: thomascimpro-6266f
        run: |
          FIRESTORE_ACCESS_TOKEN="$(gcloud auth print-access-token)" node scripts/close_duel_season.mjs --confirm-write
